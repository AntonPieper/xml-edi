<!-- Tag Name -->
<section class="editor-section">
  <div class="section-label">
    <mat-icon>label</mat-icon>
    <span>Tag Name</span>
  </div>
  <mat-form-field appearance="outline" class="full-width">
    <input
      matInput
      [value]="node().tagName"
      (input)="updateTagName($event)"
      [readonly]="readOnly()"
      spellcheck="false"
      class="mono-input"
    />
  </mat-form-field>
</section>

<!-- Attributes -->
<section class="editor-section">
  <div class="section-label">
    <mat-icon>tune</mat-icon>
    <span>Attributes</span>
    @if (!readOnly()) {
      <button
        mat-icon-button
        (click)="addAttribute()"
        matTooltip="Add attribute"
        class="section-action-btn"
      >
        <mat-icon>add_circle_outline</mat-icon>
      </button>
    }
  </div>
  <div class="attributes-list">
    @for (attr of node().attributes; track attr.id) {
      <xml-attribute-editor
        [attribute]="attr"
        [readOnly]="readOnly()"
        (attributeChange)="updateAttribute(attr.id, $event)"
        (remove)="removeAttribute(attr.id)"
      />
    } @empty {
      <p class="empty-hint">No attributes</p>
    }
  </div>
</section>

<!-- Text Content -->
<section class="editor-section">
  <div class="section-label">
    <mat-icon>notes</mat-icon>
    <span>Text Content</span>
  </div>
  <mat-form-field appearance="outline" class="full-width">
    <textarea
      matInput
      [value]="node().textContent"
      (input)="updateTextContent($event)"
      [readonly]="readOnly()"
      rows="2"
      class="content-input"
    ></textarea>
  </mat-form-field>
</section>
